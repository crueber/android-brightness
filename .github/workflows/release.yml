name: Build and Release APK

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.0.0, v1.1.0, etc.

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: List release APKs
        run: ls -la app/build/outputs/apk/release/

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: |
          mv "${{ steps.sign_app.outputs.signedReleaseFile }}" \
             app/build/outputs/apk/release/brightness-widget-${{ github.ref_name }}-signed.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Brightness Widget ${{ github.ref_name }}"
          files: app/build/outputs/apk/release/brightness-widget-${{ github.ref_name }}-signed.apk
          generate_release_notes: true
